<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Singmy</title>
    <style>
      body {
        background-size: cover;
        transition: .3s;
      }
      a {
        color: orangered;
        transition: .3s;
      }
      p {
        font-size: larger;
        font-weight: bold;
        transition: .3s;
      }
      .main {
        width: 50%;
        color: dimgray;
        margin: 100px auto;
        background: rgb(128, 128, 128, 0.1);
        padding: 40px;
        backdrop-filter: blur(21px);
        border-radius: 40px;
        box-shadow: 0 0 20px -10px #1b1b1b;
        transition: .3s;
      }
    </style>
  </head>

  <body>
    <div class="main">
      <h1>SinleUI</h1>
      <p>开发中，即将开放</p>
    </div>
  </body>
</html>
